<!DOCTYPE html>
<html>
<head>
    <title>Start Call</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            font-family: Arial, sans-serif;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            gap:20px;
        }

        button{
            font-size:24px;
            padding:20px 40px;
            border:none;
            border-radius:15px;
            cursor:pointer;
            transition:all 0.3s ease;
        }

        .sending{
            transform:scale(0.95);
            opacity:0.8;
        }

        .success{
            background:#28a745;
            color:white;
        }

        .error{
            background:#dc3545;
            color:white;
        }

        #toggleBtn{
            background:#007bff;
            color:white;
        }

        #status{
            font-size:18px;
            font-weight:bold;
        }

        #countdown{
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<button id="geminiBtn" onclick="startGemini()">
    📞 Start Call
</button>

<button id="toggleBtn" onclick="toggleAuto()">
    ⏸ Auto Send ON
</button>

<div id="status">
    Auto-send every 45 seconds
</div>

<div id="countdown">
    Next trigger in: 45s
</div>

<script>

const webhook =
"https://trigger.macrodroid.com/d0912b66-bbad-4e3e-82ce-d842fd086d68/fr";

let autoEnabled = true;
let countdown = 45;

function startGemini() {

    const btn = document.getElementById("geminiBtn");

    btn.classList.add("sending");
    btn.innerHTML = "Sending...";

    fetch(webhook)
        .then(() => {
            btn.classList.remove("sending");
            btn.classList.add("success");
            btn.innerHTML = "✅ Command Sent";
        })
        .catch(() => {
            btn.classList.remove("sending");
            btn.classList.add("error");
            btn.innerHTML = "❌📵 Failed";
        });

    setTimeout(() => {
        btn.classList.remove("success", "error");
        btn.innerHTML = "📞 Start Call";
    }, 2500);

    countdown = 45;
}

function toggleAuto(){

    autoEnabled = !autoEnabled;

    const toggleBtn = document.getElementById("toggleBtn");
    const status = document.getElementById("status");
    const countdownDiv = document.getElementById("countdown");

    if(autoEnabled){
        toggleBtn.innerHTML = "⏸ Auto Send ON";
        status.innerHTML = "Auto-send every 45 seconds";
        countdownDiv.innerHTML = `Next trigger in: ${countdown}s`;
    }else{
        toggleBtn.innerHTML = "▶ Auto Send OFF";
        status.innerHTML = "Auto-send paused";
        countdownDiv.innerHTML = "Paused";
    }
}

setInterval(() => {

    if(!autoEnabled) return;

    countdown--;

    document.getElementById("countdown").innerHTML =
        `Next trigger in: ${countdown}s`;

    if(countdown <= 0){
        startGemini();
    }

}, 1000);

startGemini();

</script>

</body>
</html>

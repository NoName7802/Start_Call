<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Call Control Console</title>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:radial-gradient(circle at top,#0f172a,#020617);
    color:white;
}

.container{
    width:92%;
    max-width:520px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;
    padding:22px;
}

.phoneBox{
    display:flex;
    margin-bottom:10px;
    border-radius:12px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.15);
}

.phoneBox span{
    padding:12px;
    background:rgba(255,255,255,0.08);
}

.phoneBox input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    background:transparent;
    color:white;
}

.timerBox{
    margin-top:12px;
    padding:14px;
    border-radius:14px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);
}

.timerRow{
    display:flex;
    gap:10px;
}

.timerRow input,
.timerRow select{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

button{
    width:100%;
    margin-top:10px;
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

.blue{background:#3b82f6;color:white;}
.red{background:#ef4444;color:white;}

.popup{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#111827;
    padding:14px 18px;
    border-radius:12px;
    opacity:0;
    transition:0.25s;
    z-index:999;
}

.popup.show{opacity:1;}

#status,#countdown{
    margin-top:10px;
    font-weight:bold;
}

.circleWrap{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:15px;
    position:relative;
}

svg{transform:rotate(-90deg);}

circle{
    fill:none;
    stroke-width:8;
    stroke-linecap:round;
}

.bg{stroke:rgba(255,255,255,0.1);}
.progress{stroke:#3b82f6;}

#ringText{
    position:absolute;
    font-size:18px;
    font-weight:bold;
}

/* 🔥 ADDED NOTE STYLE */
.note{
    margin-top:12px;
    font-size:13px;
    opacity:0.75;
    line-height:1.4;
}

</style>
</head>

<body>

<div class="popup" id="popup"></div>

<div class="container">

<h2>📡 Call Control Console</h2>

<label>From</label>
<div class="phoneBox">
    <span>+880</span>
    <input id="fromNumber" type="tel">
</div>

<label>To</label>
<div class="phoneBox">
    <span>+880</span>
    <input id="toNumber" type="tel">
</div>

<div class="timerBox">

    <div class="timerRow">
        <input type="number" id="intervalValue" value="45" min="1">
        <select id="intervalUnit">
            <option value="1">Seconds</option>
            <option value="60">Minutes</option>
            <option value="3600">Hours</option>
        </select>
    </div>

    <button class="blue" onclick="applyInterval()">Apply Interval</button>

</div>

<button class="blue" onclick="startCall()">Start Call</button>
<button class="red" onclick="toggleAuto()" id="toggleBtn">Auto OFF</button>

<div id="status">Auto: OFF</div>
<div id="countdown">Timer disabled</div>

<!-- 🔥 NOTE ADDED BACK -->
<div class="note">
Note: Currently, only a limited number of phone pairs are registered in the system.
We are actively expanding the database to support more numbers soon. Stay tuned.
</div>

<!-- CIRCLE -->
<div class="circleWrap">

<svg width="110" height="110">
    <circle class="bg" cx="55" cy="55" r="50"></circle>
    <circle class="progress" id="ring"
        cx="55" cy="55" r="50"
        stroke-dasharray="314"
        stroke-dashoffset="314"></circle>
</svg>

<div id="ringText">0</div>

</div>

</div>

<script>

// DATABASE
const numberA="1712089248";
const numberB="1726876252";

const webhookA="https://trigger.macrodroid.com/d0912b66-bbad-4e3e-82ce-d842fd086d68/fr";
const webhookB="https://trigger.macrodroid.com/6cb1ed42-d988-4b00-8b07-7bf9e4a90a1b/nn";

// STATE
let auto=false;
let interval=45;
let countdown=45;

function show(msg){
    const p=document.getElementById("popup");
    p.innerText=msg;
    p.classList.add("show");
    setTimeout(()=>p.classList.remove("show"),2000);
}

function norm(n){
    if(!n) return "";
    n=String(n).replace(/\D/g,'');
    if(n.startsWith("880")) n=n.slice(3);
    if(n.startsWith("0")) n=n.slice(1);
    return n;
}

function route(f,t){

    f=norm(f);
    t=norm(t);

    if(f===numberA && t===numberB) return webhookA;
    if(f===numberB && t===numberA) return webhookB;

    return "ERR";
}

function applyInterval(){

    interval=parseInt(document.getElementById("intervalValue").value)*
             parseInt(document.getElementById("intervalUnit").value);

    countdown=interval;

    show("Interval set: "+interval+"s");
}

function startCall(){

    const f=document.getElementById("fromNumber").value;
    const t=document.getElementById("toNumber").value;

    const res=route(f,t);

    if(res==="ERR"){
        show("Number not found in database");
        return;
    }

    fetch(res).catch(()=>show("Network error"));
    show("Trigger sent");

    countdown=interval;
}

function toggleAuto(){

    auto=!auto;

    document.getElementById("toggleBtn").innerText=
        auto?"Auto ON":"Auto OFF";

    document.getElementById("status").innerText=
        auto?"Auto: ON":"Auto: OFF";

    document.getElementById("countdown").innerText=
        auto?("Next trigger in: "+countdown+"s"):"Timer disabled";
}

setInterval(()=>{

    if(!auto) return;

    countdown--;

    if(countdown<=0){
        countdown=0;
        startCall();
        countdown=interval;
    }

    document.getElementById("countdown").innerText=
        "Next trigger in: "+countdown+"s";

    const ring=document.getElementById("ring");
    const text=document.getElementById("ringText");

    let p=countdown/interval;

    ring.style.strokeDashoffset=314-314*p;
    text.innerText=countdown;

},1000);

</script>

</body>
</html>
